<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Tools Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ─────────────────────────────────────────
   TOKENS & RESET
───────────────────────────────────────── */
:root {
  --font: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;

  --sidebar-w: 232px;
  --header-h: 54px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  /* Light theme */
  --bg-page:       #F5F5F3;
  --bg-surface:    #FFFFFF;
  --bg-subtle:     #F0EFED;
  --bg-hover:      #ECEAE7;
  --bg-active:     #E6E4E0;

  --border-default: rgba(0,0,0,0.08);
  --border-strong:  rgba(0,0,0,0.14);

  --text-primary:   #1A1A18;
  --text-secondary: #6B6A65;
  --text-tertiary:  #9B9A95;
  --text-inverse:   #FFFFFF;

  --accent:         #1A1A18;
  --accent-subtle:  #F0EFED;

  --green-bg:  #DCFCE7; --green-text:  #15803D;
  --blue-bg:   #DBEAFE; --blue-text:   #1D4ED8;
  --amber-bg:  #FEF9C3; --amber-text:  #854D0E;
  --sky-bg:    #E0F2FE; --sky-text:    #0369A1;
  --violet-bg: #EDE9FE; --violet-text: #5B21B6;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.07);
}

[data-theme="dark"] {
  --bg-page:       #111110;
  --bg-surface:    #1C1C1A;
  --bg-subtle:     #242422;
  --bg-hover:      #2C2C29;
  --bg-active:     #343431;

  --border-default: rgba(255,255,255,0.08);
  --border-strong:  rgba(255,255,255,0.14);

  --text-primary:   #F2F1EE;
  --text-secondary: #9B9A94;
  --text-tertiary:  #63635E;
  --text-inverse:   #111110;

  --accent:         #F2F1EE;
  --accent-subtle:  #242422;

  --green-bg:  #14532D; --green-text:  #86EFAC;
  --blue-bg:   #1E3A5F; --blue-text:   #93C5FD;
  --amber-bg:  #451A03; --amber-text:  #FCD34D;
  --sky-bg:    #0C3145; --sky-text:    #7DD3FC;
  --violet-bg: #2E1065; --violet-text: #C4B5FD;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font);
  background: var(--bg-page);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ─────────────────────────────────────────
   LAYOUT
───────────────────────────────────────── */
.shell {
  display: flex;
  min-height: 100vh;
}

/* ─────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-default);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }

/* Logo */
.sidebar-logo {
  height: var(--header-h);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 15px; height: 15px; fill: var(--text-inverse); }
.logo-name { font-size: 13.5px; font-weight: 600; letter-spacing: -0.3px; color: var(--text-primary); }
.logo-beta {
  font-size: 9px; font-weight: 500; letter-spacing: 0.4px;
  background: var(--amber-bg); color: var(--amber-text);
  padding: 2px 6px; border-radius: 4px; margin-left: 2px;
}

/* Sidebar sections */
.sb-section { padding: 20px 10px 6px; }
.sb-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
  color: var(--text-tertiary); text-transform: uppercase;
  padding: 0 8px; margin-bottom: 4px; display: block;
}

/* Nav items */
.nav-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 7px 10px;
  border-radius: var(--radius-md);
  border: none; background: none;
  font-family: var(--font); font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer; text-align: left;
  position: relative; transition: background 0.1s, color 0.1s;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-subtle); color: var(--text-primary); }
.nav-item.active {
  background: var(--bg-hover);
  color: var(--text-primary);
  font-weight: 500;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 2px;
  top: 7px; bottom: 7px;
  width: 2.5px;
  background: var(--accent);
  border-radius: 2px;
}
.nav-icon {
  width: 15px; height: 15px;
  opacity: 0.55; flex-shrink: 0;
}
.nav-item.active .nav-icon,
.nav-item:hover .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto;
  font-size: 10.5px; font-weight: 500;
  background: var(--bg-subtle);
  color: var(--text-tertiary);
  padding: 1px 6px; border-radius: 99px;
  font-family: var(--font-mono);
}

/* Sidebar divider */
.sb-divider {
  height: 1px; background: var(--border-default);
  margin: 8px 14px;
}

.sb-spacer { flex: 1; }

.sidebar-footer {
  padding: 10px 10px 16px;
  border-top: 1px solid var(--border-default);
}

/* ─────────────────────────────────────────
   MAIN AREA
───────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Topbar */
.topbar {
  height: var(--header-h);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-default);
  display: flex; align-items: center;
  padding: 0 24px; gap: 12px;
  position: sticky; top: 0; z-index: 100;
  flex-shrink: 0;
}
.topbar-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
.topbar-sep { width: 1px; height: 18px; background: var(--border-default); }
.topbar-crumb { font-size: 12px; color: var(--text-tertiary); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* Search */
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  width: 13px; height: 13px;
  color: var(--text-tertiary); pointer-events: none;
}
.search-input {
  height: 32px; width: 220px;
  padding: 0 12px 0 30px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  background: var(--bg-subtle);
  font-family: var(--font); font-size: 12.5px;
  color: var(--text-primary);
  transition: border-color 0.15s, width 0.2s;
}
.search-input:focus {
  outline: none;
  border-color: var(--border-strong);
  background: var(--bg-surface);
  width: 260px;
}
.search-input::placeholder { color: var(--text-tertiary); }

/* Icon button */
.icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-default);
  background: var(--bg-subtle);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-secondary);
  transition: background 0.1s, color 0.1s;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.icon-btn svg { width: 14px; height: 14px; }

/* ─────────────────────────────────────────
   CONTENT
───────────────────────────────────────── */
.content { padding: 28px 28px 48px; overflow-y: auto; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  transition: border-color 0.15s;
}
.stat-card:hover { border-color: var(--border-strong); }
.stat-label {
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 8px;
}
.stat-value {
  font-size: 26px; font-weight: 300;
  letter-spacing: -1px; line-height: 1;
  font-family: var(--font-mono);
  color: var(--text-primary);
}
.stat-sub {
  font-size: 11.5px; color: var(--text-tertiary);
  margin-top: 6px; display: flex; align-items: center; gap: 5px;
}
.stat-dot {
  width: 6px; height: 6px;
  border-radius: 50%; flex-shrink: 0;
}

/* Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.toolbar-label { font-size: 11.5px; color: var(--text-tertiary); margin-right: 2px; }

.filter-pill {
  height: 30px; padding: 0 13px;
  border-radius: 99px;
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  font-family: var(--font); font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.1s; white-space: nowrap;
}
.filter-pill:hover { border-color: var(--border-strong); color: var(--text-primary); }
.filter-pill.active {
  background: var(--accent);
  color: var(--text-inverse);
  border-color: var(--accent);
}
.pill-dot { width: 6px; height: 6px; border-radius: 50%; }

.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.view-btn {
  width: 30px; height: 30px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-tertiary);
  transition: all 0.1s;
}
.view-btn:hover, .view-btn.active { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }
.view-btn svg { width: 13px; height: 13px; }

/* Section header */
.section-hdr {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 14px; margin-top: 4px;
}
.section-hdr-left { display: flex; align-items: center; gap: 7px; }
.section-hdr-icon { font-size: 13px; line-height: 1; }
.section-hdr-title {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.7px; text-transform: uppercase;
  color: var(--text-secondary);
}
.section-hdr-badge {
  font-size: 10.5px; font-family: var(--font-mono);
  background: var(--bg-subtle); color: var(--text-tertiary);
  padding: 1px 7px; border-radius: 99px;
}
.section-hdr-line { flex: 1; height: 1px; background: var(--border-default); margin-left: 10px; }

/* ─────────────────────────────────────────
   FEATURED SCROLL STRIP
───────────────────────────────────────── */
#featured-section { margin-bottom: 32px; }

.featured-strip {
  display: flex; gap: 12px;
  overflow-x: auto; padding-bottom: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}
.featured-strip::-webkit-scrollbar { height: 3px; }
.featured-strip::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

.feat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  padding: 18px 20px;
  min-width: 260px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  position: relative; overflow: hidden;
}
.feat-card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.feat-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--card-accent, var(--accent));
  opacity: 0; transition: opacity 0.15s;
}
.feat-card:hover::after { opacity: 1; }

.feat-top { display: flex; align-items: flex-start; justify-content: space-between; }
.feat-icon-wrap { display: flex; align-items: center; gap: 10px; }
.tool-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600;
  flex-shrink: 0;
  border: 1px solid var(--border-default);
}
.feat-name { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
.feat-cat  { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.feat-desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; }
.feat-foot { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

/* ─────────────────────────────────────────
   TOOL CARDS GRID
───────────────────────────────────────── */
.category-block { margin-bottom: 36px; }

.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 10px;
}
.tools-grid.list-view { grid-template-columns: 1fr; }

.tool-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color 0.15s, transform 0.1s;
}
.tool-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
}

/* List view override */
.list-view .tool-card {
  flex-direction: row; align-items: center;
  gap: 14px; transform: none;
}
.list-view .tool-card:hover { transform: none; }
.list-view .tool-card-body { flex: 1; min-width: 0; }
.list-view .tool-desc { display: none; }
.list-view .tool-foot { margin-top: 0; }

.tool-card-top { display: flex; align-items: center; gap: 10px; }
.tool-card-info { min-width: 0; }
.tool-name { font-size: 13.5px; font-weight: 600; letter-spacing: -0.2px; }
.tool-cat  { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.tool-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
.tool-foot { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 2px; }

/* ─────────────────────────────────────────
   BADGES & TAGS
───────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  font-size: 10.5px; font-weight: 500;
  padding: 2px 9px; border-radius: 99px;
  white-space: nowrap;
}
.badge-free     { background: var(--green-bg);  color: var(--green-text); }
.badge-freemium { background: var(--blue-bg);   color: var(--blue-text); }
.badge-paid     { background: var(--amber-bg);  color: var(--amber-text); }
.badge-featured { background: var(--sky-bg);    color: var(--sky-text); }
.badge-new      { background: var(--violet-bg); color: var(--violet-text); }

.tag {
  font-size: 10.5px; padding: 2px 7px;
  border-radius: var(--radius-sm);
  background: var(--bg-subtle); color: var(--text-tertiary);
  border: 1px solid var(--border-default);
  white-space: nowrap;
}

/* ─────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--text-secondary);
}
.empty-icon {
  font-size: 36px; margin-bottom: 12px; opacity: 0.4;
}
.empty-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
.empty-sub   { font-size: 13px; color: var(--text-tertiary); }

/* ─────────────────────────────────────────
   MODAL OVERLAY
───────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.modal-overlay.open {
  opacity: 1; pointer-events: all;
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  width: 100%; max-width: 600px;
  max-height: 88vh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
  transform: translateY(16px) scale(0.98);
  transition: transform 0.22s ease, opacity 0.2s ease;
  opacity: 0;
  position: relative;
}
.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
  opacity: 1;
}

/* Modal accent bar at top */
.modal-accent-bar {
  height: 3px;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  background: var(--modal-accent, var(--accent));
}

.modal-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border-default);
  display: flex; align-items: flex-start; gap: 14px;
}
.modal-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 600;
  border: 1px solid var(--border-default);
}
.modal-title-block { flex: 1; min-width: 0; }
.modal-name {
  font-size: 18px; font-weight: 600;
  letter-spacing: -0.4px; line-height: 1.2;
  margin-bottom: 5px;
}
.modal-meta {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.modal-close {
  width: 30px; height: 30px; flex-shrink: 0;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-default);
  background: var(--bg-subtle);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-tertiary);
  transition: background 0.1s, color 0.1s;
  margin-left: 8px;
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.modal-close svg { width: 13px; height: 13px; }

.modal-body { padding: 22px 24px; display: flex; flex-direction: column; gap: 22px; }

/* Description */
.modal-section-label {
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.7px;
  text-transform: uppercase; color: var(--text-tertiary);
  margin-bottom: 8px;
}
.modal-desc {
  font-size: 13.5px; color: var(--text-secondary);
  line-height: 1.65;
}

/* Tags row */
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; }

/* Rating bar */
.modal-rating-row { display: flex; align-items: center; gap: 10px; }
.rating-stars { display: flex; gap: 2px; }
.rating-star { font-size: 14px; line-height: 1; }
.rating-value {
  font-size: 13px; font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-primary);
}
.rating-bar-track {
  flex: 1; height: 5px;
  background: var(--bg-subtle);
  border-radius: 99px; overflow: hidden;
}
.rating-bar-fill {
  height: 100%; border-radius: 99px;
  background: var(--modal-accent, #F59E0B);
  transition: width 0.4s ease;
}

/* Pros & Cons */
.pros-cons-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.pros-box, .cons-box {
  border-radius: var(--radius-lg);
  padding: 14px 16px;
}
.pros-box {
  background: var(--green-bg);
  border: 1px solid rgba(34,197,94,0.15);
}
.cons-box {
  background: #FEF2F2;
  border: 1px solid rgba(239,68,68,0.12);
}
[data-theme="dark"] .cons-box {
  background: #3B1010;
  border-color: rgba(239,68,68,0.2);
}
.pc-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 10px;
}
.pc-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.pc-title {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.pros-box .pc-title { color: var(--green-text); }
.cons-box .pc-title { color: #B91C1C; }
[data-theme="dark"] .cons-box .pc-title { color: #FCA5A5; }

.pc-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.pc-list li {
  font-size: 12.5px; line-height: 1.45;
  display: flex; align-items: flex-start; gap: 7px;
}
.pros-box .pc-list li { color: var(--green-text); }
.cons-box .pc-list li { color: #B91C1C; }
[data-theme="dark"] .cons-box .pc-list li { color: #FCA5A5; }

.pc-bullet {
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px; font-size: 9px; font-weight: 700;
}
.pros-box .pc-bullet { background: var(--green-text); color: var(--green-bg); }
.cons-box .pc-bullet { background: #B91C1C; color: #FEF2F2; }
[data-theme="dark"] .cons-box .pc-bullet { background: #FCA5A5; color: #3B1010; }

/* Modal footer CTA */
.modal-footer {
  padding: 16px 24px 22px;
  border-top: 1px solid var(--border-default);
  display: flex; align-items: center; gap: 10px;
}
.cta-primary {
  flex: 1; height: 38px;
  background: var(--accent); color: var(--text-inverse);
  border: none; border-radius: var(--radius-md);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 7px;
  transition: opacity 0.15s;
}
.cta-primary:hover { opacity: 0.85; }
.cta-primary svg { width: 13px; height: 13px; fill: var(--text-inverse); }
.cta-secondary {
  height: 38px; padding: 0 16px;
  background: var(--bg-subtle); color: var(--text-secondary);
  border: 1px solid var(--border-default); border-radius: var(--radius-md);
  font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.1s, color 0.1s;
}
.cta-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

───────────────────────────────────────── */
@media (max-width: 900px) {

  .modal-overlay { padding: 12px; align-items: flex-end; }
  .modal { max-height: 92vh; border-radius: var(--radius-xl) var(--radius-xl) 0 0; }

    accentColor: "#059669",

/* ═══════════════════════════════════════════════════
   ▲▲▲  END OF DATA  ▲▲▲
   You don't need to edit anything below this line.
   ═══════════════════════════════════════════════════ */

const CAT_ORDER = [
  "Writing & Chat","Image & Design","Coding & Dev",
  "Productivity","Audio & Video","Research & Data"
];
const CAT_ICONS = {
  "Writing & Chat":"✍","Image & Design":"🎨","Coding & Dev":"⌨",
  "Productivity":"⚡","Audio & Video":"🎬","Research & Data":"🔍"
};
const PRICING_BADGE = { free:"badge-free", freemium:"badge-freemium", paid:"badge-paid" };
const PRICING_LABEL = { free:"Free", freemium:"Freemium", paid:"Paid" };

let activeCat     = "all";
let activePricing = "all";
let searchQ       = "";
let viewMode      = "grid";

/* ── Filtering ── */
function filtered() {
  return TOOLS.filter(t => {
    if (activeCat === "featured") return t.featured;
    if (activeCat === "new")      return t.isNew;
    const catOk    = activeCat === "all" || t.category === activeCat;
    const priceOk  = activePricing === "all" || t.pricing === activePricing;
    const q        = searchQ.toLowerCase();
    const searchOk = !q || t.name.toLowerCase().includes(q)
                       || t.desc.toLowerCase().includes(q)
                       || t.tags.join(" ").toLowerCase().includes(q)
                       || t.category.toLowerCase().includes(q);
    return catOk && priceOk && searchOk;
  });
}

/* ── Build featured card ── */
function buildFeatCard(t) {
  const d = document.createElement("div");
  d.className = "feat-card";
  if (t.accentColor) d.style.setProperty("--card-accent", t.accentColor);
  d.onclick = () => openModal(t);
  d.innerHTML = `
    <div class="feat-top">
      <div class="feat-icon-wrap">
        <div class="tool-icon" style="background:${t.iconBg}">${t.icon}</div>
        <div>
          <div class="feat-name">${t.name}</div>
          <div class="feat-cat">${t.category}</div>
        </div>
      </div>
    </div>
    <div class="feat-desc">${t.desc}</div>
    <div class="feat-foot">
      <span class="badge badge-featured">Featured</span>
      <span class="badge ${PRICING_BADGE[t.pricing]}">${PRICING_LABEL[t.pricing]}</span>
      ${t.isNew ? '<span class="badge badge-new">New</span>' : ''}
    </div>`;
  return d;
}

/* ── Build tool card ── */
function buildToolCard(t) {
  const d = document.createElement("div");
  d.className = "tool-card";
  d.onclick = () => openModal(t);
  if (viewMode === "list") {
    d.innerHTML = `
      <div class="tool-icon" style="background:${t.iconBg};flex-shrink:0">${t.icon}</div>
      <div class="tool-card-body" style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="tool-name">${t.name}</span>
          <span class="tool-cat" style="margin-top:0">${t.category}</span>
        </div>
        <div class="tool-foot" style="margin-top:5px">
          <span class="badge ${PRICING_BADGE[t.pricing]}">${PRICING_LABEL[t.pricing]}</span>
          ${t.isNew ? '<span class="badge badge-new">New</span>' : ''}
          ${t.tags.slice(0,2).map(tg=>`<span class="tag">${tg}</span>`).join("")}
        </div>
      </div>
      <div class="tool-desc" style="display:block;font-size:12px;color:var(--text-secondary);max-width:340px;flex-shrink:0">${t.desc}</div>`;
  } else {
    d.innerHTML = `
      <div class="tool-card-top">
        <div class="tool-icon" style="background:${t.iconBg}">${t.icon}</div>
        <div class="tool-card-info">
          <div class="tool-name">${t.name}</div>
          <div class="tool-cat">${t.category}</div>
        </div>
      </div>
      <div class="tool-desc">${t.desc}</div>
      <div class="tool-foot">
        <span class="badge ${PRICING_BADGE[t.pricing]}">${PRICING_LABEL[t.pricing]}</span>
        ${t.isNew ? '<span class="badge badge-new">New</span>' : ''}
        ${t.tags.slice(0,2).map(tg=>`<span class="tag">${tg}</span>`).join("")}
      </div>`;
  }
  return d;
}

/* ── Main render ── */
function render() {
  const list = filtered();

  /* Stats */
  document.getElementById("stat-total").textContent    = TOOLS.length;
  document.getElementById("stat-free").textContent     = TOOLS.filter(t=>t.pricing==="free").length;
  document.getElementById("stat-freemium").textContent = TOOLS.filter(t=>t.pricing==="freemium").length;
  document.getElementById("stat-paid").textContent     = TOOLS.filter(t=>t.pricing==="paid").length;

  /* Topbar title */
  const titleMap = { all:"All Tools", featured:"Featured", new:"New this week" };
  document.getElementById("topbar-title").textContent = titleMap[activeCat] || activeCat;

  /* Featured strip — only on "all" with no search */
  const featSec   = document.getElementById("featured-section");
  const featStrip = document.getElementById("featured-strip");
  const featured  = TOOLS.filter(t=>t.featured);
  featStrip.innerHTML = "";
  document.getElementById("feat-count").textContent = featured.length;
  if (activeCat === "all" && !searchQ && featured.length) {
    featSec.style.display = "";
    featured.forEach(t => featStrip.appendChild(buildFeatCard(t)));
  } else {
    featSec.style.display = "none";
  }

  /* Category blocks */
  const container = document.getElementById("categories-container");
  container.innerHTML = "";

  let cats;
  if (activeCat === "featured") {
    const byC = {};
    list.forEach(t=>{ if(!byC[t.category]) byC[t.category]=[]; byC[t.category].push(t); });
    cats = CAT_ORDER.filter(c=>byC[c]);
    cats.forEach(cat => renderCatBlock(container, cat, byC[cat]));
  } else if (activeCat === "new") {
    const byC = {};
    list.forEach(t=>{ if(!byC[t.category]) byC[t.category]=[]; byC[t.category].push(t); });
    cats = CAT_ORDER.filter(c=>byC[c]);
    cats.forEach(cat => renderCatBlock(container, cat, byC[cat]));
  } else if (activeCat === "all") {
    const byC = {};
    list.forEach(t=>{ if(!byC[t.category]) byC[t.category]=[]; byC[t.category].push(t); });
    CAT_ORDER.filter(c=>byC[c]).forEach(cat => renderCatBlock(container, cat, byC[cat]));
  } else {
    renderCatBlock(container, activeCat, list);
  }

  /* Empty state */
  document.getElementById("empty-state").style.display = list.length === 0 ? "block" : "none";

  /* Sidebar badges */
  document.getElementById("nb-all").textContent      = TOOLS.length;
  document.getElementById("nb-featured").textContent = TOOLS.filter(t=>t.featured).length;
  document.getElementById("nb-new").textContent      = TOOLS.filter(t=>t.isNew).length;
  CAT_ORDER.forEach(cat => {
    const el = document.getElementById("nb-"+cat);
    if (el) el.textContent = TOOLS.filter(t=>t.category===cat).length;
  });
}

function renderCatBlock(container, cat, catTools) {
  if (!catTools || !catTools.length) return;
  const block = document.createElement("div");
  block.className = "category-block";
  block.innerHTML = `
    <div class="section-hdr">
      <div class="section-hdr-left">
        <span class="section-hdr-icon">${CAT_ICONS[cat]||"◆"}</span>
        <span class="section-hdr-title">${cat}</span>
        <span class="section-hdr-badge">${catTools.length}</span>
      </div>
      <span class="section-hdr-line"></span>
    </div>
    <div class="tools-grid${viewMode==='list'?' list-view':''}" id="grid-${cat.replace(/\W+/g,'')}"></div>`;
  container.appendChild(block);
  const grid = block.querySelector(".tools-grid");
  catTools.forEach(t => grid.appendChild(buildToolCard(t)));
}

/* ── Controls ── */
function setCat(btn, cat) {
  document.querySelectorAll(".nav-item[data-cat]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeCat = cat;
  render();
}

function setPricing(btn, pricing) {
  document.querySelectorAll(".filter-pill").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activePricing = pricing;
  render();
}

function onSearch(val) {
  searchQ = val;
  if (val) {
    document.querySelectorAll(".nav-item[data-cat]").forEach(b => b.classList.remove("active"));
    document.querySelector(".nav-item[data-cat='all']").classList.add("active");
    activeCat = "all";
  }
  render();
}

function setView(mode) {
  viewMode = mode;
  document.getElementById("btn-grid").classList.toggle("active", mode==="grid");
  document.getElementById("btn-list").classList.toggle("active", mode==="list");
  render();
}

function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === "dark" ? "" : "dark";
}

/* ── Modal ── */
function openModal(t) {
  const overlay = document.getElementById("modal-overlay");

  /* accent bar */
  document.getElementById("modal-accent-bar").style.background = t.accentColor || "var(--accent)";
  document.getElementById("modal").style.setProperty("--modal-accent", t.accentColor || "#F59E0B");

  /* icon */
  const iconEl = document.getElementById("modal-icon");
  iconEl.textContent = t.icon;
  iconEl.style.background = t.iconBg;

  /* name */
  document.getElementById("modal-name").textContent = t.name;

  /* meta badges */
  const meta = document.getElementById("modal-meta");
  meta.innerHTML = `
    <span class="badge ${PRICING_BADGE[t.pricing]}">${PRICING_LABEL[t.pricing]}</span>
    <span class="badge" style="background:var(--bg-subtle);color:var(--text-secondary)">${t.category}</span>
    ${t.featured ? '<span class="badge badge-featured">Featured</span>' : ''}
    ${t.isNew    ? '<span class="badge badge-new">New</span>'           : ''}
  `;

  /* description */
  document.getElementById("modal-desc").textContent = t.desc;

  /* tags */
  const tagsWrap = document.getElementById("modal-tags-wrap");
  const tagsEl   = document.getElementById("modal-tags");
  if (t.tags && t.tags.length) {
    tagsEl.innerHTML = t.tags.map(tg => `<span class="tag">${tg}</span>`).join("");
    tagsWrap.style.display = "";
  } else {
    tagsWrap.style.display = "none";
  }

  /* rating */
  const ratingWrap = document.getElementById("modal-rating-wrap");
  if (t.rating) {
    const stars  = document.getElementById("modal-stars");
    const val    = document.getElementById("modal-rating-val");
    const bar    = document.getElementById("modal-rating-bar");
    const full   = Math.floor(t.rating);
    const half   = t.rating - full >= 0.5;
    let starsHtml = "";
    for (let i = 1; i <= 5; i++) {
      if (i <= full)        starsHtml += '<span class="rating-star" style="color:#F59E0B">★</span>';
      else if (i === full+1 && half) starsHtml += '<span class="rating-star" style="color:#F59E0B">½</span>';
      else                  starsHtml += '<span class="rating-star" style="color:var(--border-strong)">★</span>';
    }
    stars.innerHTML = starsHtml;
    val.textContent = t.rating.toFixed(1) + " / 5";
    bar.style.width = (t.rating / 5 * 100).toFixed(0) + "%";
    bar.style.background = t.accentColor || "#F59E0B";
    ratingWrap.style.display = "";
  } else {
    ratingWrap.style.display = "none";
  }

  /* pros & cons */
  const pcWrap = document.getElementById("modal-pc-wrap");
  const hasPros = t.pros && t.pros.length;
  const hasCons = t.cons && t.cons.length;
  if (hasPros || hasCons) {
    const prosEl = document.getElementById("modal-pros");
    const consEl = document.getElementById("modal-cons");
    prosEl.innerHTML = (t.pros || []).map(p =>
      `<li><span class="pc-bullet">✓</span><span>${p}</span></li>`).join("");
    consEl.innerHTML = (t.cons || []).map(c =>
      `<li><span class="pc-bullet">✕</span><span>${c}</span></li>`).join("");
    pcWrap.style.display = "";
  } else {
    pcWrap.style.display = "none";
  }

  /* visit button */
  const visitBtn = document.getElementById("modal-visit-btn");
  visitBtn.onclick = () => t.url && window.open(t.url, "_blank");
  visitBtn.style.opacity = t.url ? "1" : "0.4";
  visitBtn.style.pointerEvents = t.url ? "" : "none";

  /* open */
  document.body.style.overflow = "hidden";
  overlay.classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function closeModalOnBackdrop(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

/* Esc key closes modal */
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* Initial render */
render();
</script>
</body>
